<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Spy Game ULTRA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f0f0f;
    color:#e0e0e0;
}

h1 { text-align:center; margin:20px 0; }

.screen {
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.screen.active {
    display:flex;
}

.card {
    background:#1a1a1a;
    border-radius:25px;
    padding:25px;
    width:90%;
    max-width:420px;
    text-align:center;
}

button {
    padding:16px;
    width:90%;
    max-width:420px;
    margin:10px auto;
    font-size:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.mode { background:#9c27b0; color:#fff; }
.start { background:#2196f3; color:#fff; }
.next { background:#4caf50; color:#fff; }

.teamBadge {
 padding:6px 14px;
 border-radius:12px;
 margin-bottom:10px;
 font-size:14px;
 font-weight:bold;
}

.redBadge {
 background:rgba(229,57,53,0.2);
 color:#ff5252;
}

.blueBadge {
 background:rgba(30,136,229,0.2);
 color:#42a5f5;
}

.overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:1000;
}
</style>
</head>

<body>

<h1>🎮 Spy Game ULTRA</h1>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="card">
<h2>Выбери режим</h2>
<button class="mode" onclick="openSpy()">🕵️ Шпион</button>
<button class="mode" onclick="openHostage()">🔒 Заложники</button>
</div>
</div>

<!-- HOSTAGE -->
<div id="hostageSelect" class="screen">
<div class="card">
<h2>Игроки</h2>
<button class="start" onclick="startHostage(8)">8 игроков</button>
<button class="start" onclick="startHostage(10)">10 игроков</button>
</div>
</div>

<!-- SPY -->
<div id="setup" class="screen">
<div class="card">
<h2>Настройки</h2>
<p>Игроки</p>
<input id="players" type="number" value="5">
<p>Шпионы</p>
<input id="spies" type="number" value="1">
<button class="start" onclick="startSpy()">Далее</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="card" id="card">Нажми "Следующий игрок"</div>
<button class="next" onclick="nextPlayer()">Следующий игрок</button>
<button onclick="restart()">🔁 Заново</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
<h2>Передай телефон</h2>
<button onclick="showCard()">Открыть</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let mode = null;
let players = [];
let index = 0;

const hostageRolesFull = ["Босс","Шпион","Стесняжка","Подрывник","Обычный"];
const hostageRolesNoCivil = ["Босс","Шпион","Стесняжка","Подрывник"];

// --- экран ---
function switchScreen(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// --- меню ---
function openSpy(){
 mode = "spy";
 switchScreen("setup");
}

function openHostage(){
 mode = "hostage";
 switchScreen("hostageSelect");
}

// --- запуск hostage ---
function startHostage(count){
 mode = "hostage";
 players = [];
 index = 0;

 let base = count === 8 ? hostageRolesNoCivil : hostageRolesFull;

 base.forEach(role=>{
  players.push({role:role, team:'red'});
  players.push({role:role, team:'blue'});
 });

 players.sort(()=>Math.random()-0.5);
 switchScreen("game");
}

// --- запуск spy ---
function startSpy(){
 mode = "spy";
 players = [];
 index = 0;

 let count = +document.getElementById("players").value;
 let spies = +document.getElementById("spies").value;

 if(spies >= count){
  alert("Слишком много шпионов");
  return;
 }

 for(let i=0;i<spies;i++) players.push({role:'spy'});
 for(let i=spies;i<count;i++) players.push({role:'player'});

 players.sort(()=>Math.random()-0.5);
 switchScreen("game");
}

// --- следующий ---
function nextPlayer(){
 if(index >= players.length){
  document.getElementById("card").innerHTML = "🎉 Все роли выданы";
  return;
 }
 document.getElementById("overlay").style.display="flex";
}

// --- показать карту ---
function showCard(){
 let p = players[index];
 let card = document.getElementById("card");

 if(mode === "hostage"){
  let cls = p.team === 'red' ? 'redBadge' : 'blueBadge';
  let name = p.team === 'red' ? 'Красные' : 'Синие';

  card.innerHTML = `
   <div class="teamBadge ${cls}">${name}</div>
   <h2>${p.role}</h2>
  `;
 }

 if(mode === "spy"){
  if(p.role === "spy"){
   card.innerHTML = "<h2>🕵️ ШПИОН</h2>";
  } else {
   card.innerHTML = "<h2>📍 Мирный игрок</h2>";
  }
 }

 index++;
 document.getElementById("overlay").style.display="none";
}

// --- рестарт ---
function restart(){
 location.reload();
}
</script>

</body>
</html>
