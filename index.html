<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Spy Game ULTRA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f0f0f;
    color:#e0e0e0;
    overflow:hidden;
}

h1 { text-align:center; margin:20px 0; color:#fff; }

.screen {
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:transform 0.5s ease, opacity 0.5s ease;
}

.hidden { transform:translateX(100%); opacity:0; display:none; }
.active { transform:translateX(0); opacity:1; display:flex; z-index:2; }

.card {
    background:#1a1a1a;
    border-radius:25px;
    padding:25px;
    width:90%;
    max-width:420px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

button {
    padding:18px;
    width:90%;
    max-width:420px;
    margin:10px auto;
    font-size:18px;
    border:none;
    border-radius:20px;
    display:block;
    font-weight:600;
    cursor:pointer;
}

.mode { background:#9c27b0; color:#fff; }
.start { background:#2196f3; color:#fff; }
.next { background:#4caf50; color:#fff; }

.teamBadge {
 display:inline-block;
 padding:6px 14px;
 border-radius:12px;
 margin-bottom:10px;
 font-size:14px;
 font-weight:bold;
}

.redBadge {
 background:rgba(229,57,53,0.2);
 color:#ff5252;
 border:1px solid rgba(255,82,82,0.5);
}

.blueBadge {
 background:rgba(30,136,229,0.2);
 color:#42a5f5;
 border:1px solid rgba(66,165,245,0.5);
}

.overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:1000;
}
</style>
</head>

<body>

<h1>🎮 Spy Game ULTRA</h1>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="card">
<h2>Выбери режим</h2>
<button class="mode" onclick="goTo('setup','spy')">🕵️ Шпион</button>
<button class="mode" onclick="goTo('hostageSelect','hostage')">🔒 Заложники</button>
</div>
</div>

<!-- HOSTAGE PLAYER COUNT -->
<div id="hostageSelect" class="screen hidden">
<div class="card">
<h2>Игроки</h2>
<button class="start" onclick="startHostage(8)">8 игроков</button>
<button class="start" onclick="startHostage(10)">10 игроков</button>
</div>
</div>

<!-- SETUP SPY -->
<div id="setup" class="screen hidden">
<div class="card">
<h2>Настройки</h2>
<p>Игроки</p>
<input id="players" type="number" value="5">
<p>Шпионы</p>
<input id="spies" type="number" value="1">
<button class="start" onclick="startGame()">Далее</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen hidden">
<div class="card" id="card">Нажми далее</div>
<button class="next" onclick="nextPlayer()">Следующий игрок</button>
<button onclick="restart()">🔁 Заново</button>
</div>

<div class="overlay" id="overlay">
<h2>Передай телефон</h2>
<button onclick="showCard()">Открыть</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let mode = "";
let players = [];
let index = 0;

const hostageRolesFull = ["Босс","Шпион","Стесняжка","Подрывник","Обычный"];
const hostageRolesNoCivil = ["Босс","Шпион","Стесняжка","Подрывник"];

function switchScreen(next){
 document.querySelectorAll('.screen').forEach(s=>{
  s.classList.remove('active');
  s.classList.add('hidden');
 });
 document.getElementById(next).classList.remove('hidden');
 document.getElementById(next).classList.add('active');
}

function goTo(screen, m){
 mode = m;
 switchScreen(screen);
}

function startHostage(count){
 players = [];
 index = 0;

 let baseRoles = count === 8 ? hostageRolesNoCivil : hostageRolesFull;
 let roles = [];

 baseRoles.forEach(role=>{
  roles.push({role:role, team:'red'});
  roles.push({role:role, team:'blue'});
 });

 players = roles.sort(()=>Math.random()-0.5);

 switchScreen('game');
}

function startGame(){
 let count = +document.getElementById("players").value;
 let spies = +document.getElementById("spies").value;

 if(spies >= count){
  alert("Слишком много шпионов");
  return;
 }

 players = [];
 index = 0;

 for(let i=0;i<spies;i++) players.push({role:'spy'});
 for(let i=spies;i<count;i++) players.push({role:'player'});

 players.sort(()=>Math.random()-0.5);

 switchScreen('game');
}

function nextPlayer(){
 if(index >= players.length){
  document.getElementById("card").innerHTML = "🎉 Все роли выданы";
  return;
 }
 document.getElementById("overlay").style.display="flex";
}

function showCard(){
 let p = players[index];
 let card = document.getElementById("card");

 if(mode === 'hostage'){
  let badgeClass = p.team === 'red' ? 'redBadge' : 'blueBadge';
  let emoji = p.team === 'red' ? '🔴' : '🔵';

  card.innerHTML = `
    <div class="teamBadge ${badgeClass}">
      ${emoji} ${p.team === 'red' ? 'Красные' : 'Синие'}
    </div>
    <h2>${p.role}</h2>
  `;
 } else {
  if(p.role === 'spy'){
   card.innerHTML = `<h2>🕵️ ШПИОН</h2>`;
  } else {
   card.innerHTML = `<h2>📍 Мирный игрок</h2>`;
  }
 }

 index++;
 document.getElementById("overlay").style.display="none";
}

function restart(){
 location.reload();
}
</script>

</body>
</html>
