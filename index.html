<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Spy Game</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* экран передачи телефона */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.overlay h1 {
    font-size: 26px;
    margin-bottom: 20px;
}

/* карточка */
.card {
    width: 90%;
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 20px;
    background: #222;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* кнопки */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

.start { background:#2196f3; color:white; }
.next { background:#4caf50; color:white; }
.show { background:#ff9800; color:white; }

</style>
</head>

<body>

<h1>🕵️ Spy Game</h1>

<div class="card" id="card">
    Нажмите старт
</div>

<button class="start" onclick="startGame()">Начать игру</button>
<button class="next" onclick="nextPlayer()">Следующий игрок ➡️</button>

<!-- ОВЕРЛЕЙ (ПЕРЕДАЧА ТЕЛЕФОНА) -->
<div class="overlay" id="overlay">
    <h1>📱 Передайте телефон следующему игроку</h1>
    <button class="show" onclick="showCard()">Я готов ▶</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let players = [];
let index = 0;
let currentLocation;

let locations = [
    {
        name: "🏖 Пляж",
        img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
    },
    {
        name: "🏙 Город",
        img: "https://images.unsplash.com/photo-1494526585095-c41746248156"
    },
    {
        name: "🏔 Горы",
        img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
    }
];

let spyImg = "https://cdn-icons-png.flaticon.com/512/3064/3064197.png";

function startGame() {
    index = 0;

    currentLocation = locations[Math.floor(Math.random() * locations.length)];

    players = ["player","player","player","spy","player"];
    players = players.sort(() => Math.random() - 0.5);

    document.getElementById("card").innerHTML =
        "Игра началась!";
}

function nextPlayer() {
    if (index >= players.length) {
        document.getElementById("card").innerHTML = "🎉 Игра окончена";
        return;
    }

    // ПРЯЧЕМ КАРТУ
    document.getElementById("card").innerHTML = "🔒 Готовим карту...";
    
    // ПОКАЗЫВАЕМ ОВЕРЛЕЙ
    document.getElementById("overlay").style.display = "flex";
}

function showCard() {
    const role = players[index];
    const card = document.getElementById("card");

    if (role === "spy") {
        card.innerHTML = `
            <h2>🕵️ Ты ШПИОН!</h2>
            <img src="${spyImg}">
        `;
    } else {
        card.innerHTML = `
            <h2>${currentLocation.name}</h2>
            <img src="${currentLocation.img}">
        `;
    }

    index++;

    // СКРЫВАЕМ ОВЕРЛЕЙ СРАЗУ ПОСЛЕ ПОКАЗА
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
