<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Spy Game ULTRA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f0f0f;
    color:#e0e0e0;
}

h1 { text-align:center; margin:20px 0; }

.screen {
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.screen.active { display:flex; }

.card {
    background:#1a1a1a;
    border-radius:25px;
    padding:25px;
    width:90%;
    max-width:420px;
    text-align:center;
}

button {
    padding:16px;
    width:90%;
    margin:10px auto;
    font-size:18px;
    border:none;
    border-radius:20px;
}

.mode { background:#9c27b0; color:white; }
.start { background:#2196f3; color:white; }
.next { background:#4caf50; color:white; }
.cat { background:#ff9800; color:white; }

.overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.teamBadge {
 padding:6px 12px;
 border-radius:10px;
 margin-bottom:10px;
}

.redBadge { background:#ff5252; }
.blueBadge { background:#42a5f5; }
</style>
</head>

<body>

<h1>🎮 Spy Game ULTRA</h1>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="card">
<h2>Выбери режим</h2>
<button class="mode" onclick="goSpy()">🕵️ Шпион</button>
<button class="mode" onclick="goHostage()">🔒 Заложники</button>
</div>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
<div class="card">
<h2>Настройки</h2>
<input id="players" type="number" value="5"><br>
<input id="spies" type="number" value="1"><br>
<button class="start" onclick="startGame()">Далее</button>
</div>
</div>

<!-- CATEGORY -->
<div id="categories" class="screen">
<div class="card">
<h2>Категория</h2>
<button class="cat" onclick="chooseCategory('location')">📍 Локации</button>
<button class="cat" onclick="chooseCategory('people')">👤 Люди</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="card" id="card">Нажми далее</div>
<button class="next" onclick="nextPlayer()">Следующий игрок</button>
<button onclick="restart()">🔁 Заново</button>
</div>

<div class="overlay" id="overlay">
<h2>Передай телефон</h2>
<button onclick="showCard()">Открыть</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let mode = "";
let players = [];
let index = 0;
let spiesCount = 1;
let secret = null;

// hostage роли
const hostageRoles = ["Босс","Шпион","Подрывник","Стесняжка"];

// данные
const data = {
 location:[
  {name:"Пляж", img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
  {name:"Город", img:"https://images.unsplash.com/photo-1494526585095-c41746248156"},
  {name:"Горы", img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"}
 ],
 people:[
  {name:"Месси", img:"https://upload.wikimedia.org/wikipedia/commons/8/89/Lionel_Messi_20180626.jpg"},
  {name:"Роналду", img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Cristiano_Ronaldo_2018.jpg"}
 ]
};

function switchScreen(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function goSpy(){
 mode = "spy";
 switchScreen("setup");
}

function goHostage(){
 mode = "hostage";
 switchScreen("setup");
}

function startGame(){
 let count = +document.getElementById("players").value;
 spiesCount = +document.getElementById("spies").value;

 players = [];
 index = 0;

 if(mode === "spy"){
  if(spiesCount >= count){
   alert("Слишком много шпионов");
   return;
  }
  switchScreen("categories");
 } else {
  // hostage логика
  let roles = [];
  hostageRoles.forEach(r=>{
   roles.push({role:r, team:"red"});
   roles.push({role:r, team:"blue"});
  });
  players = roles.sort(()=>Math.random()-0.5).slice(0, count);
  switchScreen("game");
 }
}

function chooseCategory(c){
 let count = +document.getElementById("players").value;

 secret = data[c][Math.floor(Math.random()*data[c].length)];

 for(let i=0;i<spiesCount;i++) players.push("spy");
 for(let i=spiesCount;i<count;i++) players.push("player");

 players.sort(()=>Math.random()-0.5);

 switchScreen("game");
}

function nextPlayer(){
 if(index >= players.length){
  document.getElementById("card").innerHTML = "🎉 Все роли выданы";
  return;
 }
 document.getElementById("overlay").style.display="flex";
}

function showCard(){
 let card = document.getElementById("card");

 if(mode === "spy"){
  let role = players[index];

  if(role === "spy"){
   card.innerHTML = "<h2>🕵️ ШПИОН</h2>";
  } else {
   card.innerHTML = `<h2>${secret.name}</h2><img src="${secret.img}">`;
  }
 }

 if(mode === "hostage"){
  let p = players[index];
  let cls = p.team === "red" ? "redBadge" : "blueBadge";

  card.innerHTML = `
    <div class="teamBadge ${cls}">${p.team}</div>
    <h2>${p.role}</h2>
  `;
 }

 index++;
 document.getElementById("overlay").style.display="none";
}

function restart(){ location.reload(); }
</script>

</body>
</html>
