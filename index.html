<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Spy Game</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    margin-top: 80px;
}

.card {
    background: #222;
    padding: 30px;
    border-radius: 16px;
    margin: 20px;
    font-size: 24px;
    min-height: 80px;
}

button {
    padding: 15px 20px;
    border: none;
    border-radius: 10px;
    background: #4caf50;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
button:active {
    transform: scale(0.98);
}
</style>

</head>

<body>

<div class="container">
    <h1>🕵️ Spy Game</h1>

    <div class="card" id="card">
        Нажмите чтобы начать
    </div>

    <button onclick="nextPlayer()">Следующий игрок ➡️</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let locationName = "🏖 Пляж";

// роли (позже можно сделать динамическими)
let roles = [];
let currentPlayer = 0;
let gameStarted = false;

// создаём игру
function initGame() {
    roles = ["player", "player", "spy", "player"];
    roles = roles.sort(() => Math.random() - 0.5);
    currentPlayer = 0;
    gameStarted = true;
}

// кнопка
function nextPlayer() {
    const card = document.getElementById("card");

    if (!gameStarted) {
        initGame();
    }

    if (currentPlayer >= roles.length) {
        card.innerHTML = "🎉 Все игроки посмотрели карты";
        return;
    }

    let role = roles[currentPlayer];

    if (role === "spy") {
        card.innerHTML = "🕵️ Ты ШПИОН!";
    } else {
        card.innerHTML = "📍 Место: " + locationName;
    }

    currentPlayer++;
}
</script>

</body>
</html>
