<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Spy Game</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* меню */
.menu {
    margin-top: 40px;
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    width: 60px;
    text-align: center;
    font-size: 18px;
}

/* кнопки */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

.start { background:#2196f3; color:white; }
.next { background:#4caf50; color:white; }
.show { background:#ff9800; color:white; }

/* карточка */
.card {
    width: 90%;
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 20px;
    background: #222;
}

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* оверлей */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}
</style>
</head>

<body>

<h1>🕵️ Spy Game</h1>

<!-- МЕНЮ -->
<div class="menu" id="menu">
    <div>
        👥 Игроки:
        <input id="playersCount" type="number" value="5" min="3" max="20">
    </div>

    <div>
        🕵️ Шпионы:
        <input id="spiesCount" type="number" value="1" min="1" max="5">
    </div>

    <button class="start" onclick="startGame()">Начать игру</button>
</div>

<!-- ИГРА -->
<div class="card" id="card" style="display:none;">
    Нажмите старт
</div>

<button class="next" id="nextBtn" style="display:none;" onclick="nextPlayer()">
Следующий игрок ➡️
</button>

<!-- ОВЕРЛЕЙ -->
<div class="overlay" id="overlay">
    <h1>📱 Передайте телефон</h1>
    <button class="show" onclick="showCard()">Я готов ▶</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let players = [];
let index = 0;
let spies = 1;
let locationData;

let locations = [
    {name:"🏖 Пляж", img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
    {name:"🏙 Город", img:"https://images.unsplash.com/photo-1494526585095-c41746248156"},
    {name:"🏔 Горы", img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"}
];

let spyImg = "https://cdn-icons-png.flaticon.com/512/3064/3064197.png";

function startGame() {
    let count = parseInt(document.getElementById("playersCount").value);
    spies = parseInt(document.getElementById("spiesCount").value);

    index = 0;

    // случайное место
    locationData = locations[Math.floor(Math.random() * locations.length)];

    // создаём роли
    players = [];

    for (let i = 0; i < spies; i++) players.push("spy");
    for (let i = spies; i < count; i++) players.push("player");

    players = players.sort(() => Math.random() - 0.5);

    document.getElementById("menu").style.display = "none";
    document.getElementById("card").style.display = "block";
    document.getElementById("nextBtn").style.display = "inline-block";

    document.getElementById("card").innerHTML = "Игра началась!";
}

function nextPlayer() {
    if (index >= players.length) {
        document.getElementById("card").innerHTML = "🎉 Игра окончена";
        return;
    }

    document.getElementById("overlay").style.display = "flex";
}

function showCard() {
    let role = players[index];
    let card = document.getElementById("card");

    if (role === "spy") {
        card.innerHTML = `
            <h2>🕵️ Ты ШПИОН!</h2>
            <img src="${spyImg}">
        `;
    } else {
        card.innerHTML = `
            <h2>${locationData.name}</h2>
            <img src="${locationData.img}">
        `;
    }

    index++;
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
