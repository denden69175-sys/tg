<script>
const tg = window.Telegram.WebApp;
tg.expand();

let roles = ["player","spy","player","player"];
let location = "🏖 Пляж";
let i = 0;

function nextPlayer(){
    const card = document.getElementById("card");

    if (!card) {
        console.log("CARD NOT FOUND");
        return;
    }

    if (i >= roles.length){
        card.innerHTML = "🎉 Игра началась!";
        return;
    }

    if (roles[i] === "spy"){
        card.innerHTML = "🕵️ Ты ШПИОН!";
    } else {
        card.innerHTML = "📍 " + location;
    }

    i++;
}
</script>
