<script>
// ================= SECURITY (БЕЗ ЛОМАЮЩИХ ФИЧ) =================

const tg = window.Telegram?.WebApp;
if (tg) tg.expand();

// ⚠️ мягкая проверка Telegram (не ломает игру)
if (!tg || !tg.initData) {
    console.warn("Открыто вне Telegram");
}

// ❌ УБРАЛИ анти DevTools (он ломал Telegram WebView)
// ❌ УБРАЛИ Object.seal (он ломал push)

// блок правого клика (безопасно)
document.addEventListener("contextmenu", e => e.preventDefault());

// блок F12 (мягкий)
document.addEventListener("keydown", e => {
    if (e.key === "F12") {
        e.preventDefault();
    }
});

// ================= GAME =================

let mode = "";
let players = []; // ✅ нормальный массив
let index = 0;
let spiesCount = 1;

// 🔐 скрытый secret (оставили)
let _secret = null;
Object.defineProperty(window, "secret", {
    get: () => undefined,
    set: () => {}
});

const data = {
 location:[
  {name:"Пляж", img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e"},
  {name:"Город", img:"https://images.unsplash.com/photo-1494526585095-c41746248156"}
 ],
 people:[
  {name:"Месси", img:"https://upload.wikimedia.org/wikipedia/commons/8/89/Lionel_Messi_20180626.jpg"},
  {name:"Роналду", img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Cristiano_Ronaldo_2018.jpg"},
  {name:"Неймар"},
  {name:"Мбаппе"},
  {name:"Погба"},
  {name:"Пеле"},
  {name:"Марадона"},
  {name:"Белингем"},
  {name:"Левандовский"},
  {name:"Олисе"},
  {name:"Винисиус"},
  {name:"Модрич"},
  {name:"Крос"},
  {name:"Ройс"},
  {name:"Роберто Карлос"},
  {name:"Рамос"},
  {name:"Вальверде"},
  {name:"Гризман"},
  {name:"Суарес"},
  {name:"Салах"}
 ]
};

function switchScreen(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* MODES */
function goSpy(){
 mode = "spy";
 switchScreen("setup");
}

function goHostage(){
 mode = "hostage";
 switchScreen("hostageSelect");
}

/* HOSTAGE */
function startHostage(count){
 players = []; // ✅ исправлено
 index = 0;

 let roles8 = ["Босс","Стесняжка","Подрывник","Шпион"];
 let roles10 = ["Босс","Стесняжка","Подрывник","Шпион","Обычный"];

 let roles = count === 8 ? roles8 : roles10;

 roles.forEach(role=>{
  players.push({role:role, team:"red"});
  players.push({role:role, team:"blue"});
 });

 players = players.sort(()=>Math.random()-0.5);

 switchScreen("game");
}

/* SPY */
function startSpy(){
 let count = +document.getElementById("players").value;
 spiesCount = +document.getElementById("spies").value;

 if(spiesCount >= count){
  alert("Слишком много шпионов");
  return;
 }

 players = []; // ✅ исправлено
 index = 0;

 switchScreen("categories");
}

function chooseCategory(c){
 let count = +document.getElementById("players").value;

 _secret = JSON.parse(JSON.stringify(
    data[c][Math.floor(Math.random()*data[c].length)]
 ));

 for(let i=0;i<spiesCount;i++) players.push("spy");
 for(let i=spiesCount;i<count;i++) players.push("player");

 players = players.sort(()=>Math.random()-0.5);

 switchScreen("game");
}

/* GAME */
function nextPlayer(){
 if(index >= players.length){
  document.getElementById("card").innerHTML = "🎉 Все роли выданы";
  return;
 }
 document.getElementById("overlay").style.display="flex";
}

function showCard(){
 let card = document.getElementById("card");

 if(mode === "spy" && !_secret){
  alert("Ошибка игры");
  return;
 }

 if(mode === "spy"){
  let role = players[index];
  if(role === "spy"){
   card.innerHTML = "<h2>🕵️ ШПИОН</h2>";
  } else {
   card.innerHTML = `<h2>${_secret.name}</h2>${
     _secret.img ? `<img src="${_secret.img}">` : ""
   }`;
  }
 }

 if(mode === "hostage"){
  let p = players[index];
  let cls = p.team === "red" ? "redBadge" : "blueBadge";

  card.innerHTML = `
    <div class="teamBadge ${cls}">${p.team === "red" ? "Красные" : "Синие"}</div>
    <h2>${p.role}</h2>
  `;
 }

 index++;
 document.getElementById("overlay").style.display="none";
}

function restart(){
 location.reload();
}
</script>
