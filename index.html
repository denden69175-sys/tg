<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Spy Game</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 30px;
}

.card {
    width: 90%;
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 20px;
    background: #222;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    font-size: 20px;
    transition: 0.3s;
}

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

.next {
    background: #4caf50;
    color: white;
}

.hide {
    background: #ff4444;
    color: white;
}

.start {
    background: #2196f3;
    color: white;
}
</style>
</head>

<body>

<h1>🕵️ Spy Game</h1>

<div class="card" id="card">
    Нажмите старт
</div>

<button class="start" onclick="startGame()">Начать игру</button>
<button class="next" onclick="nextPlayer()">Следующий игрок ➡️</button>
<button class="hide" onclick="hideCard()">Скрыть карту 🔒</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let players = [];
let index = 0;

let locations = [
    {
        name: "🏖 Пляж",
        img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
    },
    {
        name: "🏙 Город",
        img: "https://images.unsplash.com/photo-1494526585095-c41746248156"
    },
    {
        name: "🏔 Горы",
        img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
    }
];

let spyImg = "https://cdn-icons-png.flaticon.com/512/3064/3064197.png";

let currentLocation;

function startGame() {
    index = 0;

    currentLocation = locations[Math.floor(Math.random() * locations.length)];

    players = ["player","player","player","spy","player"];
    players = players.sort(() => Math.random() - 0.5);

    document.getElementById("card").innerHTML = "Игра началась! Передайте телефон 👇";
}

function nextPlayer() {
    const card = document.getElementById("card");

    if (players.length === 0) {
        card.innerHTML = "Нажмите старт";
        return;
    }

    if (index >= players.length) {
        card.innerHTML = "🎉 Все игроки посмотрели карты";
        return;
    }

    let role = players[index];

    if (role === "spy") {
        card.innerHTML = `
            <h2>🕵️ Ты ШПИОН!</h2>
            <img src="${spyImg}">
        `;
    } else {
        card.innerHTML = `
            <h2>${currentLocation.name}</h2>
            <img src="${currentLocation.img}">
        `;
    }

    index++;
}

function hideCard() {
    document.getElementById("card").innerHTML = "🔒 Передайте телефон следующему игроку";
}
</script>

</body>
</html>
