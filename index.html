
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spy Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
.container { margin-top:100px; }
.card { background:#222; padding:20px; border-radius:15px; margin:20px; font-size:22px; }
button { padding:15px; border:none; border-radius:10px; background:#4caf50; color:white; font-size:18px; }
</style>
</head>
<body>

<div class="container">
<h1>🕵️ Spy Game</h1>

<div class="card" id="card">Нажми чтобы начать</div>

<button onclick="nextPlayer()">Следующий игрок ➡️</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let roles = ["player","spy","player","player"];
let location = "🏖 Пляж";
let i = 0;

function nextPlayer(){
    const card = document.getElementById("card");

    if(i >= roles.length){
        card.innerHTML = "🎉 Игра началась!";
        return;
    }

    if(roles[i] === "spy"){
        card.innerHTML = "🕵️ Ты ШПИОН!";
    } else {
        card.innerHTML = "📍 " + location;
    }

    i++;
}
</script>

</body>
</html>
